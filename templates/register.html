{% extends 'base.html' %}

{% block content %}
<div class="form-container">
    <h2 class="neon-text-blue">Реєстрація на курс</h2>
    <p style="color: #aaa; text-align: center; margin-bottom: 20px;">Заповніть форму, і ми зв'яжемося з вами!</p>
    
    <form action="{{ url_for('register') }}" method="POST">
        <div class="form-group">
            <label for="username">Ваше ім'я</label>
            <input type="text" id="username" name="username" placeholder="Іван Іванов" required>
        </div>
        
        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" placeholder="example@gmail.com" required>
        </div>
        
        <div class="form-group">
            <label for="phone">Номер телефону</label>
            <input type="tel" id="phone" name="phone" placeholder="+380..." required>
        </div>
        
        <button type="submit" class="btn-submit">Надіслати заявку</button>
    </form>
</div>
{% endblock %}
